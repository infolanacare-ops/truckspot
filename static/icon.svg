<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e"/>
      <stop offset="100%" style="stop-color:#252d45"/>
    </linearGradient>
    <linearGradient id="pin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="truck" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)" rx="0"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="200" x2="1024" y2="200"/>
    <line x1="0" y1="400" x2="1024" y2="400"/>
    <line x1="0" y1="600" x2="1024" y2="600"/>
    <line x1="0" y1="800" x2="1024" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="1024"/>
    <line x1="400" y1="0" x2="400" y2="1024"/>
    <line x1="600" y1="0" x2="600" y2="1024"/>
    <line x1="800" y1="0" x2="800" y2="1024"/>
  </g>

  <!-- Map pin shape (large, centered) -->
  <path d="M512 140 C360 140 238 262 238 414 C238 566 390 710 512 840 C634 710 786 566 786 414 C786 262 664 140 512 140 Z"
        fill="url(#pin)" filter="url(#shadow)"/>

  <!-- Inner white circle in pin -->
  <circle cx="512" cy="400" r="165" fill="white" opacity="0.12"/>
  <circle cx="512" cy="400" r="145" fill="white" opacity="0.08"/>

  <!-- Truck icon inside pin (white, centered around 512,400) -->
  <!-- Truck body (cab) -->
  <rect x="340" y="340" width="200" height="130" rx="18" fill="url(#truck)"/>
  <!-- Truck cargo -->
  <rect x="540" y="355" width="130" height="115" rx="12" fill="white" opacity="0.85"/>
  <!-- Cab window -->
  <rect x="355" y="355" width="90" height="60" rx="10" fill="#3b82f6" opacity="0.7"/>
  <!-- Connector between cab and cargo -->
  <rect x="530" y="365" width="18" height="90" fill="white" opacity="0.6"/>
  <!-- Front grill accent -->
  <rect x="338" y="400" width="14" height="50" rx="4" fill="#6d28d9" opacity="0.8"/>
  <!-- Wheels -->
  <circle cx="390" cy="478" r="32" fill="#1a1f2e"/>
  <circle cx="390" cy="478" r="20" fill="#3b82f6"/>
  <circle cx="390" cy="478" r="8" fill="white"/>
  <circle cx="600" cy="478" r="32" fill="#1a1f2e"/>
  <circle cx="600" cy="478" r="20" fill="#3b82f6"/>
  <circle cx="600" cy="478" r="8" fill="white"/>

  <!-- "TS" text below pin tip area -->
  <text x="512" y="960"
        text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="88"
        fill="white"
        opacity="0.9"
        letter-spacing="8">TruckSpot</text>

  <!-- Small dot indicator at pin bottom -->
  <circle cx="512" cy="840" r="18" fill="white" opacity="0.9"/>
</svg>
