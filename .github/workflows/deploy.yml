name: Deploy to Hetzner

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.104.87.149
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: /opt/truckspot/deploy.sh
